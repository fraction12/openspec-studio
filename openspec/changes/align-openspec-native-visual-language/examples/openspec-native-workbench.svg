  <rect x="1002" y="284" width="610" height="596" rx="10" fill="#fbfbfa" stroke="#deded8"/>
  <rect x="1002" y="284" width="610" height="42" rx="10" fill="#f4f4f1"/>
  <text x="1024" y="310" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6e736a">proposal.md</text>
  <text x="1024" y="365" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="780" fill="#1a1d18">Why</text>
  <text x="1024" y="394" font-family="Inter, ui-sans-serif, system-ui" font-size="14" fill="#3c4038">OpenSpec Studio should feel like a native companion to OpenSpec rather than</text>
  <text x="1024" y="416" font-family="Inter, ui-sans-serif, system-ui" font-size="14" fill="#3c4038">a generic dashboard wrapped around OpenSpec data.</text>
  <text x="1024" y="462" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="780" fill="#1a1d18">What Changes</text>
  <circle cx="1030" cy="494" r="3" fill="#575c53"/>
  <text x="1046" y="499" font-family="Inter, ui-sans-serif, system-ui" font-size="14" fill="#3c4038">Artifact-first layout with source paths and markdown previews up front.</text>
  <circle cx="1030" cy="526" r="3" fill="#575c53"/>
  <text x="1046" y="531" font-family="Inter, ui-sans-serif, system-ui" font-size="14" fill="#3c4038">Quiet status pills that read as trust cues, not dashboard badges.</text>
  <circle cx="1030" cy="558" r="3" fill="#575c53"/>
  <text x="1046" y="563" font-family="Inter, ui-sans-serif, system-ui" font-size="14" fill="#3c4038">Document and code surfaces styled like OpenSpec examples.</text>

  <rect x="1024" y="606" width="544" height="180" rx="8" fill="#111827"/>
  <text x="1048" y="638" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#a8f0c6">+ Requirement: OpenSpec-native visual language</text>
  <text x="1048" y="666" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#d7dce2">The system SHALL express a restrained, text-first visual language.</text>
  <text x="1048" y="706" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#f4c7c3">- Dashboard-style noise and repeated status language</text>
  <text x="1048" y="734" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#d7dce2">Source text remains the center of review.</text>
  <text x="1024" y="828" font-family="Inter, ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#6b7067">Supporting context stays low-emphasis. Artifact text stays primary.</text>
</svg>
